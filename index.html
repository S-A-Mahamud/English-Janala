<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Title -->
    <title>English Janala</title>
    <!-- Fav icon -->
    <link rel="icon" type="image/x-icon" href="./assets/logo.png">
    <!-- Tailwind css + daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Fontawesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>
<style>
    * {
        font-family: "Poppins", sans-serif;
    }

    .bangla-font {
        font-family: "Hind Siliguri", sans-serif;
    }

    .active {
        background-color: #0ea5e9;
        color: white;
    }
</style>

<body>
    <header>
        <nav>
            <div class="navbar bg-[#BADEFF26] shadow-sm md:px-16 md:py-4">
                <div class="navbar-start">
                    <div class="dropdown">
                        <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4 6h16M4 12h8m-8 6h16" />
                            </svg>
                        </div>
                        <ul tabindex="-1"
                            class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow">
                            <li>
                                <a href="" class=""><i class="fa-solid fa-circle-question"></i> FAQ</a>
                            </li>
                            <li>
                                <a href="" class=""><i class="fa-solid fa-book-open"></i> Learn</a>
                            </li>
                            <li>
                                <a href="" class=""><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
                            </li>
                        </ul>
                    </div>
                    <a class="flex items-center justify-center gap-1 text-2xl pl-2"><span
                            class="font-bold">English</span> <img src="./assets/logo.png" alt="Logo"><span
                            class="bangla-font font-semibold">জানালা</span></a>
                </div>
                <div class="navbar-end hidden lg:flex">
                    <ul class="menu menu-horizontal px-1 gap-2">
                        <li>
                            <a href="" class="btn btn-outline btn-primary"><i class="fa-solid fa-circle-question"></i>
                                FAQ</a>
                        </li>
                        <li>
                            <a href="" class="btn btn-outline btn-primary"><i class="fa-solid fa-book-open"></i>
                                Learn</a>
                        </li>
                        <li>
                            <a href="" class="btn btn-outline btn-primary"><i
                                    class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <!-- Hero section -->
        <section
            class="flex flex-col md:flex-row md:items-center md:justify-between px-2 py-4 md:px-16 md:py-12 md:gap-12">
            <div class=" ">
                <!-- Banner text -->
                <div class="space-y-3">
                    <h2 class="text-4xl"><span class="font-bold text-sky-400">English</span> is Easy!!</h2>
                    <p class="max-w-xl bangla-font">আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা
                        আপনার দক্ষতা বাড়াতে চান, আমাদের
                        Interactive Lessons আপনাকে নিয়ে যাবে অন্য একটি Level এ
                    </p>
                </div>

                <!-- Login form -->
                <div class="mt-8">
                    <fieldset class="fieldset border-none rounded-box w-s md:w-xs border space-y-4">
                        <input type="text" class="input" placeholder="Enter Your Name" />

                        <input type="password" class="input" placeholder="........." />

                        <button class="btn btn-primary max-w-34">Get Started</button>
                    </fieldset>
                </div>
            </div>

            <!-- Banner img -->
            <div class="">
                <img src="./assets/hero-student.png" alt="Student" class="w-full">
            </div>
        </section>
   
    </main>


    <footer>

    </footer>
    <script src="./JavaScript/script.js"></script>
</body>

</html>
